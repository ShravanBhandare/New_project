presets:
  quality_compounder:
    filters:
      - metric: return_on_equity_pct
        operator: ">"
        value: 15.0
      - metric: debt_to_equity
        operator: "<"
        value: 1.0
      - metric: free_cash_flow_cr
        operator: ">"
        value: 0.0
      - metric: sales_cagr_5yr
        operator: ">"
        value: 10.0
    ranking_metric: composite_quality_score
    sort_order: desc

  value_pick:
    filters:
      - metric: pe_ratio
        operator: "<"
        value: 20.0
      - metric: pb_ratio
        operator: "<"
        value: 3.0
      - metric: debt_to_equity
        operator: "<"
        value: 2.0
      - metric: dividend_yield_pct
        operator: ">"
        value: 1.0
    ranking_metric: fcf_yield
    sort_order: desc

  growth_accelerator:
    filters:
      - metric: pat_cagr_5yr
        operator: ">"
        value: 20.0
      - metric: sales_cagr_5yr
        operator: ">"
        value: 15.0
      - metric: debt_to_equity
        operator: "<"
        value: 2.0
    ranking_metric: pat_cagr_5yr
    sort_order: desc

  dividend_champion:
    filters:
      - metric: dividend_yield_pct
        operator: ">"
        value: 2.0
      - metric: dividend_payout_ratio_pct
        operator: "<"
        value: 80.0
      - metric: free_cash_flow_cr
        operator: ">"
        value: 0.0
    ranking_metric: dividend_yield_pct
    sort_order: desc

  debt_free_blue_chip:
    filters:
      - metric: debt_to_equity
        operator: "=="
        value: 0.0
      - metric: return_on_equity_pct
        operator: ">"
        value: 12.0
      - metric: sales
        operator: ">"
        value: 5000.0
    ranking_metric: return_on_equity_pct
    sort_order: desc

  turnaround_watch:
    filters:
      - metric: sales_cagr_3yr
        operator: ">"
        value: 10.0
      - metric: free_cash_flow_cr
        operator: ">"
        value: 0.0
    ranking_metric: sales_cagr_3yr
    sort_order: desc
